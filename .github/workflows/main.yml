name: Build GKI Popsicle (SM8850)

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kowsu+susfs
          - kowsu
          - xxksu
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string
      create_release:
        description: 'Publish a GitHub Release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  setup:
    name: Setup Resolve Build Config
    runs-on: ubuntu-latest
    outputs:
      release_tag:       ${{ steps.config.outputs.release_tag }}
      kernel_ver:        ${{ steps.config.outputs.kernel_ver }}
      build_kowsu_susfs: ${{ steps.config.outputs.build_kowsu_susfs }}
      build_kowsu:       ${{ steps.config.outputs.build_kowsu }}
      build_xxksu:       ${{ steps.config.outputs.build_xxksu }}
      build_xxksu_clang23: ${{ steps.config.outputs.build_xxksu_clang23 }}
    steps:
      - id: config
        name: Resolve variant flags & release tag
        run: |
          DATE_TAG=$(date +'%Y%m%d')
          echo "release_tag=${DATE_TAG}"                       >> $GITHUB_OUTPUT
          echo "kernel_ver=6.12.${{ inputs.sub_level }}" >> $GITHUB_OUTPUT

          VARIANT="${{ inputs.ksu_variant }}"

          if [[ "$VARIANT" == "all" || "$VARIANT" == "kowsu+susfs" ]]; then
            echo "build_kowsu_susfs=true"  >> $GITHUB_OUTPUT
          else
            echo "build_kowsu_susfs=false" >> $GITHUB_OUTPUT
          fi

          if [[ "$VARIANT" == "all" || "$VARIANT" == "kowsu" ]]; then
            echo "build_kowsu=true"        >> $GITHUB_OUTPUT
          else
            echo "build_kowsu=false"       >> $GITHUB_OUTPUT
          fi

          if [[ "$VARIANT" == "all" || "$VARIANT" == "xxksu" ]]; then
            echo "build_xxksu=true"        >> $GITHUB_OUTPUT
            # 同时构建 Clang 23 测试版
            echo "build_xxksu_clang23=true" >> $GITHUB_OUTPUT
          else
            echo "build_xxksu=false"       >> $GITHUB_OUTPUT
            echo "build_xxksu_clang23=false" >> $GITHUB_OUTPUT
          fi

  build_kowsu_susfs:
    name: Build KowSU + SuSFS
    needs: setup
    if: needs.setup.outputs.build_kowsu_susfs == 'true'
    uses: ./.github/workflows/build-kowsu-susfs.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  build_kowsu:
    name: Build KowSU
    needs: setup
    if: needs.setup.outputs.build_kowsu == 'true'
    uses: ./.github/workflows/build-kowsu.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  build_xxksu:
    name: Build xxKSU (Clang 19)
    needs: setup
    if: needs.setup.outputs.build_xxksu == 'true'
    uses: ./.github/workflows/build-xxksu.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  build_xxksu_clang23:
    name: Build xxKSU (Clang 23 Test)
    needs: setup
    if: needs.setup.outputs.build_xxksu_clang23 == 'true'
    uses: ./.github/workflows/build-xxksu-clang23.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  release:
    name: Release Publish Artifacts
    needs: [setup, build_kowsu_susfs, build_kowsu, build_xxksu, build_xxksu_clang23]
    if: |
      always() &&
      inputs.create_release == true &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/release.yml
    with:
      ksu_variant:  ${{ inputs.ksu_variant }}
      sub_level:    ${{ inputs.sub_level }}
      release_tag:  ${{ needs.setup.outputs.release_tag }}
      kernel_ver:   ${{ needs.setup.outputs.kernel_ver }}
    secrets: inherit
