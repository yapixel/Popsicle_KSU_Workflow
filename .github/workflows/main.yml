name: Build GKI Popsicle (SM8850) - Clang 22 Pure Test

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'xxksu'
        type: choice
        options:
          - xxksu
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string
      create_release:
        description: 'Publish a GitHub Release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  setup:
    name: Setup Resolve Build Config
    runs-on: ubuntu-latest
    outputs:
      release_tag:       ${{ steps.config.outputs.release_tag }}
      kernel_ver:        ${{ steps.config.outputs.kernel_ver }}
      build_xxksu:       ${{ steps.config.outputs.build_xxksu }}
    steps:
      - id: config
        name: Resolve variant flags & release tag
        run: |
          DATE_TAG=$(date +'%Y%m%d')
          echo "release_tag=${DATE_TAG}"                       >> $GITHUB_OUTPUT
          echo "kernel_ver=6.12.${{ inputs.sub_level }}" >> $GITHUB_OUTPUT
          echo "build_xxksu=true" >> $GITHUB_OUTPUT

  build_xxksu:
    name: Build xxKSU (Clang 22 Pure Test)
    needs: setup
    if: needs.setup.outputs.build_xxksu == 'true'
    uses: ./.github/workflows/build-xxksu-clang22-pure.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  release:
    name: Release Publish Artifacts
    needs: [setup, build_xxksu]
    if: |
      always() &&
      inputs.create_release == true &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/release.yml
    with:
      ksu_variant:  ${{ inputs.ksu_variant }}
      sub_level:    ${{ inputs.sub_level }}
      release_tag:  ${{ needs.setup.outputs.release_tag }}
      kernel_ver:   ${{ needs.setup.outputs.kernel_ver }}
    secrets: inherit
