name: Build GKI SUSFS with KowSU

on:
  workflow_dispatch:
    inputs:
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string
      create_release:
        description: 'Publish a GitHub Release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      sub_level: ${{ steps.config.outputs.sub_level }}
      create_release: ${{ steps.config.outputs.create_release }}
      release_tag: ${{ steps.config.outputs.release_tag }}
    steps:
      - name: Initialize Build Matrix
        id: set-matrix
        run: |
          echo 'matrix={"variant":["kowsu+susfs"]}' >> $GITHUB_OUTPUT

      - name: Configure Build Environment
        id: config
        run: |
          echo "sub_level=${{ github.event.inputs.sub_level }}" >> $GITHUB_OUTPUT
          echo "create_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT
          echo "release_tag=v6.12.${{ github.event.inputs.sub_level }}-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      ENABLE_SUSFS: 'true'
      KSU_VARIANT: ${{ matrix.variant }}
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prepare Build Environment & Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Fetch Versioning Scripts
        run: |
          git clone --depth=1 https://github.com/yapixel/sh "${{ github.workspace }}/sh"
          chmod +x "${{ github.workspace }}/sh/get_ksuver.sh"

      - name: Download & Extract Kernel Source and Toolchains
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_gki_kernel_common/archive/refs/heads/android16-6.12-2025-06.zip -o common.zip
          unzip -q common.zip && mv "android_gki_kernel_common-android16-6.12-2025-06" common && rm common.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19 && rm clang.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/rust.zip -o rust.zip
          unzip -q rust.zip -d rust && rm rust.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip && rm build-tools.zip
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name: Sync SuSFS Source
        run: |
          SUSFS_DIR="${{ github.workspace }}/susfs4ksu"
          git clone --depth=1 --branch=gki-android16-6.12-dev \
            https://gitlab.com/simonpunk/susfs4ksu "$SUSFS_DIR"
          echo "SUSFS_DIR=$SUSFS_DIR" >> $GITHUB_ENV
          SUSFS_VERSION=$(grep -m1 'define SUSFS_VERSION' "$SUSFS_DIR/kernel_patches/include/linux/susfs.h" | sed 's/.*"\(.*\)"/\1/')
          echo "SUSFS_VERSION=${SUSFS_VERSION:-unknown}" >> $GITHUB_ENV

      - name: Integrate KernelSU into Source Tree
        run: |
          cd kernel_workspace/common

          # 1. Clone Repository
          git clone --depth=1 --branch master https://github.com/KOWX712/KernelSU.git KernelSU

          # 2. Link KernelSU to drivers
          ln -sf ../KernelSU/kernel drivers/kernelsu

          # 3. Inject into Build System
          if ! grep -q "kernelsu/" drivers/Makefile; then echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile; fi
          if ! grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig; then sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig; fi

          # 4. KowSU Header Fix
          echo "Applying KowSU Header Fix..."

          KSU_KERNEL_ABS="$(realpath KernelSU/kernel)"
          KSU_POL_ABS="${KSU_KERNEL_ABS}/policy"
          KSU_INC_ABS="${KSU_KERNEL_ABS}/include"
          KSU_UAPI_ABS="$(realpath KernelSU/uapi)"

          mkdir -p "${KSU_KERNEL_ABS}/uapi"
          cp -f "${KSU_UAPI_ABS}"/*.h "${KSU_KERNEL_ABS}/uapi/" 2>/dev/null || true

          find drivers/kernelsu -type d | while read -r dir; do
            mkdir -p "$dir/uapi"
            cp -f "${KSU_UAPI_ABS}"/*.h "$dir/uapi/" 2>/dev/null || true
          done

          find drivers/kernelsu -type d | while read -r dir; do
            cp -f "${KSU_POL_ABS}"/*.h "$dir/" 2>/dev/null || true
            cp -f "${KSU_INC_ABS}"/*.h "$dir/" 2>/dev/null || true
          done

          mkdir -p include/uapi
          cp -f "${KSU_POL_ABS}"/*.h include/uapi/
          cp -f "${KSU_POL_ABS}"/*.h include/
          cp -f "${KSU_INC_ABS}"/*.h include/
          cp -f "${KSU_UAPI_ABS}"/*.h include/uapi/

      - name: Resolve KernelSU Version
        run: |
          KSU_VER=$("${{ github.workspace }}/sh/get_ksuver.sh" "KOWX712" "KernelSU" "master" || echo "unknown")
          echo "KSU_VER=${KSU_VER}" >> $GITHUB_ENV

      - name: "Patching: KowSU + SuSFS (10+50 Logic)"
        run: |
          cd kernel_workspace/common

          # 1. Kernel-side SuSFS
          cp "${{ env.SUSFS_DIR }}/kernel_patches/fs/susfs.c" fs/
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs.h" include/linux/
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs_def.h" include/linux/
          patch -p1 < "${{ env.SUSFS_DIR }}/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch"

          # 2. KSU-side SuSFS
          cd KernelSU
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/kowsu/10_enable_susfs_for_ksu.patch"

      - name: Apply KMI/Vermagic Bypass Logic
        run: |
          cd kernel_workspace/common
          cat << 'EOF' > kmi_bypass.patch
          --- a/kernel/module/version.c
          +++ b/kernel/module/version.c
          @@ -51,8 +51,8 @@
           	return 1;
           bad_version:
          -	pr_warn("%s: disagrees about version of symbol %s\n", info->name, symname);
          -	return 0;
          +	pr_warn("%s: disagrees about version of symbol %s. (bypassed)\n", info->name, symname);
          +	return 1;
           }
          EOF
          patch -p1 --fuzz=3 < kmi_bypass.patch || (sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c && sed -i 's/disagrees about version of symbol/disagrees about version of symbol (bypassed)/' kernel/module/version.c)

      - name: Inject Defconfig Configurations
        run: |
          cd kernel_workspace
          DEFCONFIG="./common/arch/arm64/configs/gki_defconfig"
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          echo "CONFIG_KSU_DEBUG=n" >> $DEFCONFIG
          echo "CONFIG_KPROBES=y" >> $DEFCONFIG
          echo "CONFIG_HAVE_KPROBES=y" >> $DEFCONFIG

          cat >> $DEFCONFIG <<-'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF
          
      - name: Debug KowSU exported symbols
        run: |
         grep -rn "ksu_handle_execveat\|ksu_handle_newfstat_ret\|ksu_handle_stat\|ksu_handle_faccessat\|ksu_handle_sys_reboot" \
         $GITHUB_WORKSPACE/kernel_workspace/common/KernelSU/kernel/ || echo "NONE FOUND"

      - name: "Compilation: GKI Image"
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang19/bin:$WORKDIR/kernel_workspace/build-tools/bin:$WORKDIR/kernel_workspace/rust/bin:$PATH"
          cd kernel_workspace/common
          sed -i "s/^SUBLEVEL = .*/SUBLEVEL = ${{ needs.setup.outputs.sub_level }}/" Makefile
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfakestat.so
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfaketimeMT.so
          chmod +x libfakestat.so libfaketimeMT.so
          export FAKESTAT="2025-09-12 04:57:41"
          export FAKETIME="@2025-09-12 04:57:41"
          export PRELOAD_LIBS="$(pwd)/libfakestat.so $(pwd)/libfaketimeMT.so"
          export REAL_CLANG_PATH="$WORKDIR/kernel_workspace/clang19/bin/clang"
          echo '#!/bin/bash' > cc-wrapper && echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper && echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper && echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper && echo '$REAL_CLANG_PATH "$@"' >> cc-wrapper
          echo '#!/bin/bash' > ld-wrapper && echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper && echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper && echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper && echo 'ld.lld "$@"' >> ld-wrapper
          chmod +x cc-wrapper ld-wrapper
          COMMON_REAL_PATH=$(pwd -P) && ROOT_REAL_PATH=$(dirname "$COMMON_REAL_PATH")
          export KCFLAGS="-fdebug-prefix-map=$ROOT_REAL_PATH=. -fmacro-prefix-map=$ROOT_REAL_PATH=. -ffile-prefix-map=$ROOT_REAL_PATH=. -no-canonical-prefixes -O2 -pipe -Wno-error -fno-stack-protector"
          export RUSTC="rustc" BINDGEN="bindgen" CC="clang" LIBCLANG_PATH="$WORKDIR/kernel_workspace/clang19/lib" HOSTCC=clang LD="ld.lld" HOSTLD=ld.lld LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
          export KBUILD_BUILD_USER="kleaf" KBUILD_BUILD_HOST="build-host" KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025"
          make -j$(nproc --all) O=out gki_defconfig
          export CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper"
          make -j$(nproc --all) O=out Image

      - name: Build Flashable Zip (AnyKernel3)
        run: |
          cd kernel_workspace
          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cp ./common/out/arch/arm64/boot/Image ./AnyKernel3/
          BUILD_DATE="$(date +'%d%m%y')"
          cd AnyKernel3
          ZIP_NAME="${{ matrix.variant }}_popsicle_6.12.${{ needs.setup.outputs.sub_level }}+${{ env.KSU_VER }}-${BUILD_DATE}-susfs-${{ env.SUSFS_VERSION || 'none' }}.zip"
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Store Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kernel-${{ matrix.variant }}
          path: kernel_workspace/${{ env.ZIP_NAME }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Fetch Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: kernel-*
          path: release_zips
          merge-multiple: true
      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.setup.outputs.release_tag }}"
          name: "GKI 6.12.${{ needs.setup.outputs.sub_level }} — ${{ needs.setup.outputs.release_tag }}"
          body: "Automated GKI build for android16-6.12 (KowSU + SuSFS)."
          files: release_zips/*.zip
