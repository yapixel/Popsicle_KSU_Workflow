name: Fix fs_open Patch Offset

on:
  workflow_dispatch: 

jobs:
  fix-offset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Kernel Source
        run: |
          mkdir -p kernel_src
          curl -L -o common.tar.gz https://github.com/yapixel/gki-build-assets/releases/download/android16-6.12-2025-06_r58/common-android16-6.12-2025-06_r58.tar.gz
          tar -xf common.tar.gz -C kernel_src

      - name: Regenerate Zero-Offset Patch
        run: |
          # 1. 准确定位源码根目录
          ROOT_DIR=$(find kernel_src -path "*/fs/open.c" | sed 's|/fs/open.c||' | head -n 1)
          cd "$ROOT_DIR"
          
          # 2. 建立干净的原始备份
          cp fs/open.c open.c.orig

          # 3. 应用带偏移的旧补丁
          # 即使有 offset，patch 也会把代码写入文件
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"
         

          # 4. 重新 diff，生成 0 偏移补丁
          # 这一步生成的 diff 将包含 6.12 最新的行号和上下文
          diff -u open.c.orig fs/open.c > "${{ github.workspace }}/fs_open_612_perfect.patch" || true

      - name: Output to Summary
        run: |
          echo "### fs/open.c 6.12 完美对齐补丁" >> $GITHUB_STEP_SUMMARY
          echo "请复制以下内容替换原有的 ksu_fs_open.patch 文件：" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          cat "${{ github.workspace }}/fs_open_612_perfect.patch" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fs-open-612-perfect
          path: fs_open_612_perfect.patch
