name: GKI Kernel 6.12.23 — ReSukiSU (Xiaomi / OPPO / OnePlus / Realme)

env:
  TZ:              Asia/Shanghai
  ANDROID_VERSION: android16
  KERNEL_VERSION:  '6.12'
  SUB_VERSION:     '23'
  KERNEL_NAME:     android16-5-ga8f88ad96df3-ab13929693-4k
  DEFCONFIG:       arch/arm64/configs/gki_defconfig
  TOOLCHAIN_BASE:  https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225
  KERNEL_SOURCE:   https://github.com/cctv18/android_gki_kernel_common/archive/refs/heads/android16-6.12-2025-06.zip

on:
  workflow_dispatch:
    inputs:
      kernel_suffix:
        description: >
          Custom kernel version suffix. Leave blank to use the default KERNEL_NAME.
          Do not prefix with a hyphen or include spaces/reserved characters.
        required: false
        type: string
        default: ''

jobs:

  # ─────────────────────────────────────────────
  #  BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ksuver:  ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.package.outputs.ak3name }}

    steps:

      - name: Checkout workflow repository
        uses: actions/checkout@v4

      # ── Environment ──────────────────────────

      - name: Install build dependencies
        run: |
          sudo apt-mark hold firefox libc-bin
          sudo apt-get purge -y man-db
          sudo rm -rf /var/lib/man-db/auto-update
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev

      - name: Free up runner disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL

      # ── Sources ──────────────────────────────

      - name: Fetch kernel source
        run: |
          echo "::group::Download"
          aria2c -s16 -x16 -k1M "${{ env.KERNEL_SOURCE }}" -o kernel_source.zip
          echo "::endgroup::"
          echo "::group::Extract"
          unzip -q kernel_source.zip
          mv android_gki_kernel_common-android16-6.12-2025-06 common
          rm -f kernel_source.zip
          echo "::endgroup::"

      - name: Patch setlocalversion — strip -dirty suffix
        run: |
          sed -i 's/ -dirty//g' common/scripts/setlocalversion
          sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' common/scripts/setlocalversion

      # ── Toolchains ───────────────────────────

      - name: Fetch LLVM Clang 19 toolchain
        run: |
          aria2c -s16 -x16 -k1M "${{ env.TOOLCHAIN_BASE }}/clang-r536225.zip" -o clang.zip
          mkdir -p clang19
          unzip -q clang.zip -d clang19
          rm -f clang.zip

      - name: Fetch Rust 1.82.0 toolchain
        run: |
          aria2c -s16 -x16 -k1M "${{ env.TOOLCHAIN_BASE }}/rust.zip" -o rust.zip
          mkdir -p rust
          unzip -q rust.zip -d rust
          rm -f rust.zip

      - name: Fetch build tools
        run: |
          aria2c -s16 -x16 -k1M "${{ env.TOOLCHAIN_BASE }}/build-tools.zip" -o build-tools.zip
          unzip -q build-tools.zip
          rm -f build-tools.zip

      # ── KernelSU ─────────────────────────────

      - name: Integrate ReSukiSU
        id: ksu_version
        run: |
          curl -LSs \
            "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" \
            | bash -s main
          KSU_VERSION=$(expr $(git -C KernelSU rev-list --count main) + 30700 2>/dev/null || echo 114514)
          echo "KSUVER=${KSU_VERSION}" >> $GITHUB_ENV
          echo "ksuver=${KSU_VERSION}" >> $GITHUB_OUTPUT
          echo "ReSukiSU version: ${KSU_VERSION}"

      # ── Kernel configuration ─────────────────

      - name: Apply KernelSU defconfig options
        run: |
          DEFCONFIG="common/${{ env.DEFCONFIG }}"
          cat >> "$DEFCONFIG" <<'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=n
          CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@cctv18"
          EOF

      - name: Apply general defconfig options
        run: |
          DEFCONFIG="common/${{ env.DEFCONFIG }}"
          cat >> "$DEFCONFIG" <<'EOF'
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
          CONFIG_HEADERS_INSTALL=n
          CONFIG_RUST=y
          CONFIG_ANDROID_BINDER_IPC_RUST=m
          CONFIG_LOCALVERSION_AUTO=n
          EOF
          sed -i 's/check_defconfig//' common/build.config.gki

      - name: Apply network defconfig options
        run: |
          DEFCONFIG="common/${{ env.DEFCONFIG }}"
          cat >> "$DEFCONFIG" <<'EOF'
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          EOF
          wget -q \
            "https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/config.patch" \
            -O common/config.patch
          patch -p1 -F3 -d common < common/config.patch || true
          rm -f common/config.patch

      - name: Apply TCP congestion control defconfig options
        run: |
          DEFCONFIG="common/${{ env.DEFCONFIG }}"
          cat >> "$DEFCONFIG" <<'EOF'
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_CONG_VEGAS=y
          CONFIG_TCP_CONG_NV=y
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_TCP_CONG_BRUTAL=y
          CONFIG_DEFAULT_TCP_CONG=cubic
          EOF

      - name: Set kernel version string
        run: |
          SUFFIX="${{ github.event.inputs.kernel_suffix }}"
          TARGET="${SUFFIX:-${{ env.KERNEL_NAME }}}"
          sed -i "\$s|echo \"\\\$res\"|echo \"-${TARGET}\"|" common/scripts/setlocalversion
          sed -i "s/-4k/-${TARGET}/g" common/${{ env.DEFCONFIG }}
          sed -i 's/${scm_version}//' common/scripts/setlocalversion

      # ── Compile ──────────────────────────────

      - name: Build kernel image
        run: |
          WORKDIR="$(pwd)"
          export PATH="${WORKDIR}/clang19/bin:${WORKDIR}/build-tools/bin:${WORKDIR}/rust/bin:${PATH}"

          echo "::group::Toolchain versions"
          clang   --version | head -1
          ld.lld  --version | head -1
          rustc   -V 2>/dev/null || true
          bindgen --version 2>/dev/null || true
          pahole  --version 2>/dev/null || echo "pahole: not installed"
          echo "::endgroup::"

          cd common

          # Path remapping — required for gendwarfksyms (Rust/6.12 kernel).
          # Absolute paths break symbol checksum generation; remap to relative.
          COMMON_REAL=$(pwd -P)
          ROOT_REAL=$(dirname "$COMMON_REAL")
          KCFLAGS=" -fdebug-prefix-map=${ROOT_REAL}=."
          KCFLAGS+=" -fmacro-prefix-map=${ROOT_REAL}=."
          KCFLAGS+=" -ffile-prefix-map=${ROOT_REAL}=."
          KCFLAGS+=" -no-canonical-prefixes -O2 -pipe -Wno-error -fno-stack-protector"
          KCFLAGS+=" -D__ANDROID_COMMON_KERNEL__"
          export KCFLAGS

          # Rust tooling — required for scripts/rust_is_available.sh pre-build check
          export RUSTC="rustc"
          export BINDGEN="bindgen"
          export CC="clang"
          export LIBCLANG_PATH="${WORKDIR}/clang19/lib"

          export HOSTCC=clang  HOSTLD=ld.lld
          export LLVM=1        LLVM_IAS=1
          export ARCH=arm64    SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LD=ld.lld     AR=llvm-ar  NM=llvm-nm  AS=clang  READELF=llvm-readelf
          export OBJCOPY=llvm-objcopy  OBJDUMP=llvm-objdump  OBJSIZE=llvm-size  STRIP=llvm-strip

          source "./_setup_env.sh" 2>/dev/null || true

          # Reproducible build identity
          export KBUILD_BUILD_USER=kleaf
          export KBUILD_BUILD_HOST=build-host
          export KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025"

          MAKE_ARGS="LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang LD=ld.lld OBJCOPY=llvm-objcopy O=out"

          echo "::group::Configure"
          make -j$(nproc --all) $MAKE_ARGS gki_defconfig
          echo "::endgroup::"

          echo "::group::Compile"
          make -j$(nproc --all) $MAKE_ARGS Image
          echo "::endgroup::"

          echo "Post-build disk usage:"
          df -h

      # ── Package ──────────────────────────────

      - name: Package with AnyKernel3
        id: package
        run: |
          git clone --depth=1 https://github.com/cctv18/AnyKernel3 AnyKernel3
          rm -rf AnyKernel3/.git

          IMAGE="common/out/arch/arm64/boot/Image"
          if [[ ! -f "$IMAGE" ]]; then
            echo "::error::Kernel image not found at $IMAGE — build may have failed."
            exit 1
          fi
          cp "$IMAGE" AnyKernel3/Image

          CLEAN_SUB="${{ env.SUB_VERSION }}"
          CLEAN_SUB="${CLEAN_SUB%_mtk}"
          BUILD_DATE="$(TZ='Asia/Shanghai' date +'%y%m%d')"
          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          FULL_VERSION="${{ env.KERNEL_VERSION }}.${CLEAN_SUB}"
          AK3_NAME="ReSukiSU_popsicle_${FULL_VERSION}+${{ env.KSUVER }}-${BUILD_DATE}.zip"
          zip -r "${AK3_NAME}" AnyKernel3/*
          echo "ak3name=${AK3_NAME}" >> $GITHUB_OUTPUT

          {
            echo "Author:     $GITHUB_ACTOR"
            echo "Repo:       $GITHUB_REPOSITORY"
            echo "Branch:     $GITHUB_REF_NAME"
            echo "Run ID:     $GITHUB_RUN_ID"
            echo "Commit:     $GITHUB_SHA"
            echo "Time:       $TIME_NOW"
            echo "Kernel:     ${FULL_VERSION}+${{ env.KSUVER }}"
            echo "KSU:        ReSukiSU ${{ env.KSUVER }}"
            echo "Network:    IPset + BBR enabled"
          } | zip -z "${AK3_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.ak3name }}
          path: ReSukiSU_*.zip
          archive: false

  # ─────────────────────────────────────────────
  #  RELEASE
  # ─────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      packages: write
      actions: read

    steps:

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.ak3name }}
          path: release_zips
          skip-decompress: true

      - name: Resolve release metadata
        id: meta
        run: |
          CLEAN_SUB="${{ env.SUB_VERSION }}"
          CLEAN_SUB="${CLEAN_SUB%_mtk}"
          FULL_VERSION="${{ env.KERNEL_VERSION }}.${CLEAN_SUB}+${{ needs.build.outputs.ksuver }}"
          echo "full_version=${FULL_VERSION}"                              >> $GITHUB_OUTPUT
          echo "time=$(TZ='Asia/Shanghai' date +'%y%m%d-%H%M%S')"          >> $GITHUB_OUTPUT
          echo "time_fmt=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: "popsicle-${{ steps.meta.outputs.time }}"
          name:     "ReSukiSU_popsicle_${{ steps.meta.outputs.full_version }}"
          body: |
            ## 📱 GKI Kernel ${{ steps.meta.outputs.full_version }} · ReSukiSU

            | Field | Value |
            |---|---|
            | **Kernel version** | ${{ steps.meta.outputs.full_version }} |
            | **Build time** | ${{ steps.meta.outputs.time_fmt }} |
            | **Target SoC** | Snapdragon 8 Elite (SM8850) |
            | **Supported devices** | Xiaomi / OPPO / OnePlus / Realme (universal GKI) |
            | **Source branch** | `android16-6.12-2025-06` |
            | **KernelSU variant** | ReSukiSU `${{ needs.build.outputs.ksuver }}` |
            | **Network extras** | IPset, BBR, Brutal, CUBIC, VEGAS, NV, Westwood+, HTCP |

            ---

            ### 📦 Installation

            **Option A — Custom recovery (TWRP etc.)**
            1. Boot into recovery
            2. Flash the AnyKernel3 zip
            3. Reboot

            **Option B — Root access**
            1. Install [HorizonKernelFlasher](https://github.com/libxzr/HorizonKernelFlasher/releases)
            2. Flash the AnyKernel3 zip through the app
            3. Reboot

            > **KernelSU manager:** [tiann/KernelSU releases](https://github.com/tiann/KernelSU/releases)
            >
            > KSU now requires a **meta-module** for system-mount modules to work correctly.
            > Install one before using module mounts:
            > [meta-overlayfs](https://github.com/KernelSU-Modules-Repo/meta-overlayfs) ·
            > [mountify](https://github.com/backslashxx/mountify) ·
            > [meta-magic_mount](https://github.com/7a72/meta-magic_mount/) ·
            > [hybrid-mount](https://github.com/YuzakiKokuban/meta-hybrid_mount)

            ---

            > ⚠️ **Always back up your `boot` partition** with [KernelFlasher](https://github.com/capntrips/KernelFlasher) before flashing any custom kernel.
          draft: false
          prerelease: false
          files: release_zips/AnyKernel3_*.zip
