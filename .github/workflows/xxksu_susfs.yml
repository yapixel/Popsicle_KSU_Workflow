name: TEST Build - xxKSU + GKI 6.12 + SuSFS

on:
  workflow_dispatch:
    inputs:
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string

permissions:
  contents: write

jobs:
  build_test:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'
      KSU_VARIANT: 'xxksu+susfs'

    steps:
      - name: Checkout Workflow Repo
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Download Toolchains & Source
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          # Android 16 GKI Source
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_gki_kernel_common/archive/refs/heads/android16-6.12-2025-06.zip -o common.zip
          unzip -q common.zip && mv "android_gki_kernel_common-android16-6.12-2025-06" common && rm common.zip
          
          # Clang 19 & Rust Toolchains
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19 && rm clang.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/rust.zip -o rust.zip
          unzip -q rust.zip -d rust && rm rust.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip && rm build-tools.zip

      - name: Sync SuSFS & xxKSU
        run: |
          # Sync SuSFS for Android 16
          git clone --depth=1 --branch=gki-android16-6.12 https://gitlab.com/simonpunk/susfs4ksu susfs4ksu
          echo "SUSFS_VERSION=$(grep -m1 'define SUSFS_VERSION' susfs4ksu/kernel_patches/include/linux/susfs.h | sed 's/.*\"\(.*\)\"/\1/')" >> $GITHUB_ENV
          
          # Sync xxksu (backslashxx)
          cd kernel_workspace/common
          git clone --depth=1 --branch master https://github.com/backslashxx/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Apply Patch Chain (Hooks -> 50 -> 10)
        run: |
          cd kernel_workspace/common
          # 1. Base xxksu Hooks
          curl -LSs "https://raw.githubusercontent.com/$GITHUB_REPOSITORY/main/.github/patches/xxksu/manual-security-hooks-v1.8.patch" -o hook1.patch || touch hook1.patch
          curl -LSs "https://raw.githubusercontent.com/$GITHUB_REPOSITORY/main/.github/patches/xxksu/scope-min-hooks-v1.9.patch" -o hook2.patch || touch hook2.patch
          patch -p1 < hook1.patch || echo "⚠️ Hook 1 failed"
          patch -p1 < hook2.patch || echo "⚠️ Hook 2 failed"

          # 2. SuSFS Engine (50 Patch)
          cp ../../susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp ../../susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          cp ../../susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/
          patch -p1 < ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch || true

          # 3. specialized xxksu SuSFS 10 Patch
          cd KernelSU
          curl -LSs "https://raw.githubusercontent.com/yapixel/kernel_patches/dev/xxksu/10_susfs_backslashxx_ksu_patches.patch" -o xxksu_10.patch
          patch -p1 < xxksu_10.patch

      - name: Configure Defconfig (Performance + KSU + SuSFS)
        run: |
          DEFCONFIG="kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          cat >> $DEFCONFIG <<-'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_DEBUG=n
          CONFIG_KSU_EXTRAS=y
          CONFIG_KSU_TAMPER_SYSCALL_TABLE=n
          
          # SuSFS Engine Flags
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y

          # Core Bootability & Performance
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
          CONFIG_RUST=y
          CONFIG_LOG_BUF_SHIFT=21
          CONFIG_ANDROID_BINDER_IPC_RUST=m
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y

          # Networking & BBR
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y

          # IPSet Suite
          CONFIG_IP_SET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_NET=y
          
          # TProxy & Redirect
          CONFIG_NETFILTER_XT_TARGET_TPROXY=y
          CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_REDIRECT=y
          EOF

      - name: Build Kernel Image
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang19/bin:$WORKDIR/kernel_workspace/build-tools/bin:$WORKDIR/kernel_workspace/rust/bin:$PATH"
          cd kernel_workspace/common
          sed -i "s/^SUBLEVEL = .*/SUBLEVEL = ${{ github.event.inputs.sub_level }}/" Makefile
          
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          make -j$(nproc --all) O=out gki_defconfig
          make -j$(nproc --all) O=out Image

      - name: Package & Upload
        run: |
          cd kernel_workspace
          git clone https://github.com/yapixel/AnyKernel3 --depth=1 AnyKernel3
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="TEST-xxksu-susfs-6.12.${{ github.event.inputs.sub_level }}.zip"
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_PATH=kernel_workspace/$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-kernel-xxksu-susfs
          path: ${{ env.ZIP_PATH }}
